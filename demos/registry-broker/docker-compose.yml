services:
  broker:
    image: registry-broker:demo
    command: python broker_http.py
    volumes:
      - ./agent_policy.yaml:/app/agent_policy.yaml:ro   # ONLY the broker gets the policy (read-only)
    environment:                          # <-- add this block
      OPENBAO_ADDR: http://openbao:8200
      OPENBAO_TOKEN: root
    networks:
      - sealed

  agent:
    image: registry-broker:demo
    command: python agent_in_box.py
    read_only: true            # the agent's whole filesystem is read-only
    tmpfs:
      - /tmp                   # except a scratch /tmp it needs at runtime
    environment:
      BROKER_URL: http://broker:8000/mcp
      PYTHONDONTWRITEBYTECODE: "1"   # don't try to write .pyc files
    networks:
      - sealed
    # no volumes → no policy, no audit, no secret.

  openbao:
    image: openbao/openbao
    command: server -dev
    environment:
      BAO_DEV_ROOT_TOKEN_ID: root
    cap_add: [IPC_LOCK]
    networks: [sealed]

networks:
  sealed:
    internal: true     # THE EGRESS CUT: this network has no route to the internet