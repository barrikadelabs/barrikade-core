name: CI

# Lightweight CI for catching regressions that don't require model artifacts.
# Heavy end-to-end tests (tests/layer_*/test_layer_*.py) are intentionally excluded
# because they need the full GCS bundle pulled and take 20+ minutes on CPU.
# The PR author or reviewer is expected to run those locally when the change
# could plausibly affect runtime numerics.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  install-runtime:
    name: Install runtime deps + smoke imports
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.runtime.txt

      - name: Install requirements.runtime.txt
        # This is exactly what the production Docker image installs. If pip
        # can't resolve the pins together (e.g. a transformers version that
        # conflicts with optimum-onnx), this step fails and the rest of the
        # job short-circuits. Upgrade pip first to avoid resolver-version
        # quirks on GitHub-hosted runners (matches publish.yml's pattern).
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.runtime.txt

      - name: Verify critical runtime imports
        # These are the import paths the runtime layer code actually uses.
        # The optimum.onnxruntime import is the canary that would have caught
        # the missing-optimum-onnx-dep regression from a previous PR. Add
        # to this list when a new dep enters the runtime hot path.
        env:
          PYTHONPATH: "."
        run: |
          python -c "import core.onnx_patch; from optimum.onnxruntime import ORTModelForFeatureExtraction, ORTModelForSequenceClassification"
          python -c "from sentence_transformers import SentenceTransformer"
          python -c "import onnxruntime"
          python -c "import torch"

      - name: Smoke import of runtime modules
        # Catches AttributeErrors / import-time crashes in our own code.
        # Does not require model artifacts because we don't construct the
        # PIPipeline here (that would try to load files from disk).
        env:
          PYTHONPATH: "."
        run: |
          python -c "from core.settings import Settings; Settings()"
          python -c "from api.server import app"

  test-fast:
    name: Fast tests (synthetic data, no artifacts needed)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install requirements.txt (includes pytest)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run fast tests (unit and telemetry suites)
        # With the new revamped test organization, fast unit tests and telemetry
        # verification tests are isolated under tests/unit/ and tests/telemetry/.
        # Slow evaluation tests are isolated under tests/integration_eval/.
        # This completely eliminates the need for fragile file-based --ignore lists!
        env:
          PYTHONPATH: "."
        run: |
          pytest -q tests/unit/ tests/telemetry/

      - name: Run barrikada-mcp server tests
        # The MCP server (barrikada-mcp/) is a separate sub-distribution whose
        # tests aren't covered by the suites above (root testpaths = ["tests"]).
        # They mock the pipeline, so no model artifacts are needed, but they do
        # need `mcp`. Pin starlette to the overlap of mcp's sse-starlette
        # (>=0.49.1) and the core's fastapi (<0.50) so installing mcp on top of
        # requirements.txt doesn't pull an incompatible starlette.
        env:
          PYTHONPATH: "."
        run: |
          python -m pip install "mcp>=1.27.1" "starlette>=0.49.1,<0.50"
          pytest -q barrikada-mcp

  docker-build:
    name: Production Docker image build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build production image
        # Build only (don't push, don't run). This catches Dockerfile drift
        # and confirms requirements.runtime.txt resolves inside the actual
        # python:3.11-slim build context. Pip's wheel resolution can differ
        # subtly between the host runner and the container build, so a
        # successful host install in install-runtime is necessary but not
        # sufficient.
        run: docker build --target production -t barrikada/api:ci .
